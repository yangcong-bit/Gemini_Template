name: STM32 Keil Automated Build
run-name: 自动编译 STM32 工程
on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发

jobs:
  build:
    runs-on: windows # 这里的 windows 呼应了你刚才绑定的标签
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v3

      - name: 调用 Keil 命令行编译
        # 假设你的工程文件在 MDK-ARM 文件夹下
        run: |
          echo "开始调用 Keil 进行静默编译..."
          # 注意：请确保 C:\Keil_v5\UV4\UV4.exe 是你实际的 Keil 安装路径
          C:\Users\Administrator\AppData\Local\Keil_v5\UV4\UV4.exe -b MDK-ARM\Gemini_Template.uvprojx -j0 -o build_log.txt
          
      - name: 提取编译产物 (HEX/BIN)
        uses: actions/upload-artifact@v3
        with:
          name: STM32_Firmware
          # 提取编译出来的固件和日志，打包供网页端下载
          path: |
            MDK-ARM\*.hex
            MDK-ARM\build_log.txt